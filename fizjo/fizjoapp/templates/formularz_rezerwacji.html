{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <title>Potwierdź rezerwację – FizjoApp</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
  <style>
    body{background:#f3eafe;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .res-card{background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(144,51,214,.13);overflow:hidden;max-width:520px;width:100%;}
    .res-card::before{content:'';display:block;height:5px;background:linear-gradient(90deg,#9033d6,#6722a8);}
    .btn-pac{background:#9033d6;color:#fff;border:none;}
    .btn-pac:hover{background:#7a28b8;color:#fff;}
    .info-row{background:#f5effe;border-radius:8px;padding:.65rem 1rem;margin-bottom:.75rem;}
    .info-row strong{color:#6722a8;min-width:90px;display:inline-block;}
  </style>
</head>
<body>
  <div class="res-card m-3">
    <div class="p-4 p-md-5">
      <h3 class="fw-bold mb-1"><i class="fas fa-calendar-plus me-2" style="color:#9033d6"></i>Potwierdź rezerwację</h3>
      <p class="text-muted small mb-4">Sprawdź dane i dodaj notatkę dla fizjoterapeuty.</p>

      <div class="info-row"><strong>Lekarz:</strong> {{ lekarz.get_full_name|default:lekarz.username }}</div>
      <div class="info-row"><strong>Termin:</strong> {{ start }}</div>

      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="start" value="{{ start }}"/>
        <input type="hidden" name="end"   value="{{ end }}"/>

        <div class="mb-4 mt-3">
          <label class="form-label fw-semibold">Powód wizyty / notatka dla lekarza</label>
          <textarea name="powod" rows="4" class="form-control" placeholder="Opisz dolegliwości lub cel wizyty…"></textarea>
        </div>

        <div class="d-flex flex-column gap-2">
          <button type="submit" class="btn btn-pac btn-lg w-100">
            <i class="fas fa-check me-2"></i> Wyślij propozycję wizyty
          </button>
          <a href="{% url 'profil_lekarza' lekarz.id %}" class="btn btn-outline-secondary w-100">
            Anuluj i wróć do kalendarza
          </a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
