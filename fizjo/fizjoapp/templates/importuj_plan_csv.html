{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-info text-white">
          <h4 class="mb-0">
            <i class="fas fa-file-import"></i> Importuj plan z CSV
          </h4>
        </div>
        <div class="card-body">
          <p class="text-muted">
            Wgraj plik CSV z ćwiczeniami. Wymagany format kolumn:
            <strong>Nazwa ćwiczenia, Serie, Powtórzenia</strong>.
          </p>

          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
              <label for="nazwa" class="form-label"
                >Nazwa planu treningowego</label
              >
              <input
                type="text"
                class="form-control"
                id="nazwa"
                name="nazwa"
                required
                placeholder="np. Trening funkcjonalny - Kolano"
              />
            </div>

            <div class="mb-3">
              <label for="pacjent" class="form-label"
                >Przypisz do pacjenta</label
              >
              <select class="form-select" id="pacjent" name="pacjent" required>
                <option value="">Wybierz pacjenta...</option>
                {% for p in pacjenci %}
                <option value="{{ p.id }}">
                  {{ p.imie }} {{ p.nazwisko }}
                </option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-4">
              <label for="plik_csv" class="form-label">Plik CSV</label>
              <input
                class="form-control"
                type="file"
                id="plik_csv"
                name="plik_csv"
                accept=".csv"
                required
              />
            </div>

            <div class="d-flex justify-content-between">
              <a
                href="{% url 'programy_fizjo' %}"
                class="btn btn-outline-secondary"
                >Anuluj</a
              >
              <button type="submit" class="btn btn-info text-white">
                <i class="fas fa-upload"></i> Wgraj i Utwórz
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
