{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <title>Importuj CSV – FizjoApp</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
  <style>
    body{background:#f5edf8;}
    .fizjo-nav{background:#1a0d1c;border-bottom:3px solid #cb34d9;}
    .card-top::before{content:'';display:block;height:4px;background:linear-gradient(90deg,#cb34d9,#7b1fa2);}
    .btn-fizjo{background:#cb34d9;color:#fff;border:none;}
    .btn-fizjo:hover{background:#b52ec2;color:#fff;}
    .format-pill{background:#f3e5fb;color:#7b1fa2;border-radius:6px;padding:.4rem .8rem;font-family:monospace;font-size:.85rem;}
  </style>
</head>
<body>
  <nav class="fizjo-nav navbar navbar-dark shadow-sm mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold"><i class="fas fa-notes-medical" style="color:#cb34d9"></i> FizjoApp – Import CSV</span>
      <a href="{% url 'programy_fizjo' %}" class="btn btn-outline-light btn-sm">← Wróć do planów</a>
    </div>
  </nav>

  <div class="container pb-5" style="max-width:640px">
    <div class="card shadow-sm overflow-hidden">
      <div class="card-top"></div>
      <div class="card-body p-4">
        <h3 class="fw-bold mb-1"><i class="fas fa-file-import" style="color:#cb34d9"></i> Importuj plan z pliku CSV</h3>
        <p class="text-muted small mb-4">Wgraj gotowy plan ćwiczeń. Wymagany format kolumn:</p>
        <div class="d-flex gap-2 flex-wrap mb-4">
          <span class="format-pill">Nazwa ćwiczenia</span>
          <span class="format-pill">Serie</span>
          <span class="format-pill">Powtórzenia</span>
        </div>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Nazwa planu treningowego</label>
            <input type="text" class="form-control" name="nazwa" required placeholder="np. Trening funkcjonalny – Kolano"/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Przypisz do pacjenta</label>
            <select class="form-select" name="pacjent" required>
              <option value="">Wybierz pacjenta…</option>
              {% for p in pacjenci %}
              <option value="{{ p.id }}">{{ p.imie }} {{ p.nazwisko }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Plik CSV</label>
            <input class="form-control" type="file" name="plik_csv" accept=".csv" required/>
          </div>

          <div class="d-flex gap-2">
            <a href="{% url 'programy_fizjo' %}" class="btn btn-outline-secondary">Anuluj</a>
            <button type="submit" class="btn btn-fizjo flex-grow-1">
              <i class="fas fa-upload me-1"></i> Wgraj i utwórz plan
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
