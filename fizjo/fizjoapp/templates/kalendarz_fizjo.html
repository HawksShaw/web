{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kalendarz – FizjoApp</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/calendar.css' %}"/>
</head>
<body>
  <nav class="fizjo-nav shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="brand-text">
        <i class="fas fa-notes-medical me-2" style="color:#cb34d9"></i>Fizjo<span>App</span>
        <span class="text-white fw-light ms-1"><b>/ Kalendarz</b></span>
      </span>
        <a href="{% url 'dashboard_fizjo' %}" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Panel główny</a>
      </a>
    </div>
  </nav>

  <div class="container pb-5" style="max-width:1020px">
    <div class="calendar-card">
      <div class="calendar-inner">
        <div class="legend-bar">
          <span class="legend-pill pill-pending">⏳ Oczekująca</span>
          <span class="legend-pill pill-accepted">✅ Zaakceptowana</span>
          <span class="legend-pill pill-rejected">❌ Odrzucona</span>
          <span class="legend-pill pill-blocked">🔒 Zablokowana przez Ciebie</span>
        </div>
        <div id="calendar"></div>
      </div>
    </div>
  </div>

 <!-- 
_____________________________________________________________________
Modale do kalendarza - szablony bootstrapa do popup'ów po kliknięciu
_____________________________________________________________________
-->
  <div class="modal fade" id="wizytaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-calendar-check me-2"></i>Szczegóły wizyty</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 py-3">
          <p><strong>Pacjent:</strong> <span id="modalPacjent"></span></p>
          <p><strong>Powód:</strong> <span id="modalPowod"></span></p>
          <p><strong>Status:</strong> <span id="modalStatus"></span></p>
        </div>
        <div class="modal-footer" id="modalFooter"></div>
      </div>
    </div>
  </div>
<!-- 
_____________________________________________________________
              Szablon FullCalendar z jsdelivr
_____________________________________________________________
-->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  <script>
    function getCsrf() {
      const name = 'csrftoken';
      for (let c of document.cookie.split(';')) {
        const [k, v] = c.trim().split('=');
        if (k === name) return decodeURIComponent(v);
      }
      return '';
    }

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const modal = new bootstrap.Modal(document.getElementById('wizytaModal'));

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        slotMinTime: '08:00:00',
        slotMaxTime: '18:00:00',
        allDaySlot: false,
        selectable: true,
        height: 'auto',
        expandRows: false,
        locale: 'pl',
        nowIndicator: true,

        // Pokaż przyciski
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay',
        },

        buttonText: {
          today:  'Dziś',
          month:  'Miesiąc',
          week:   'Tydzień',
          day:    'Dzień',
        },

        dayHeaderFormat: { weekday: 'long' },
        events: '/api/get-appointments/',

        // Pokaż modale po kliknięciu
        eventClick: function (info) {
          const props = info.event.extendedProps;
          document.getElementById('modalPacjent').textContent = props.pacjent_nazwa || '—';
          document.getElementById('modalPowod').textContent   = props.powod || 'Brak powodu';

          const labels = {
            oczekujaca:   '⏳ Oczekująca',
            zaakceptowana:'✅ Zaakceptowana',
            odrzucona:    '❌ Odrzucona',
            zablokowana:  '🔒 Zablokowana',
          };
          document.getElementById('modalStatus').textContent = labels[props.status] || props.status;

          const footer = document.getElementById('modalFooter');
          footer.innerHTML = '';

          if (props.status === 'oczekujaca') {
            const id = info.event.id;

            const btnOk = document.createElement('button');
            btnOk.className = 'btn btn-success';
            btnOk.innerHTML = '<i class="fas fa-check me-1"></i> Zatwierdź';
            btnOk.onclick = () =>
              fetch('/api/zatwierdz-wizyte/' + id + '/', { headers: { 'X-CSRFToken': getCsrf() } })
                .then(r => r.json())
                .then(() => { modal.hide(); calendar.refetchEvents(); });

            const btnNo = document.createElement('button');
            btnNo.className = 'btn btn-danger ms-2';
            btnNo.innerHTML = '<i class="fas fa-times me-1"></i> Odrzuć';
            btnNo.onclick = () =>
              fetch('/api/odrzuc-wizyte/' + id + '/', { headers: { 'X-CSRFToken': getCsrf() } })
                .then(r => r.json())
                .then(() => { modal.hide(); calendar.refetchEvents(); });

            footer.appendChild(btnOk);
            footer.appendChild(btnNo);
          } else if (props.status === 'odrzucona') {
            // Fizjo może usunąć rekord na kalendarzu jeśli się pomyli / będzie mógł zwolnić dany termin
            const btnUsun = document.createElement('button');
            btnUsun.className = 'btn btn-outline-danger me-2';
            btnUsun.innerHTML = '<i class="fas fa-trash me-1"></i> Usuń i zwolnij termin';
            btnUsun.onclick = () => {
              if (confirm('Usunąć tę odrzuconą rezerwację i zwolnić termin?')) {
                fetch('/api/usun-wizyte/' + info.event.id + '/', {
                  headers: { 'X-CSRFToken': getCsrf() }
                })
                  .then(r => r.json())
                  .then(() => { modal.hide(); calendar.refetchEvents(); });
              }
            };
            const closeBtn2 = document.createElement('button');
            closeBtn2.className = 'btn btn-secondary';
            closeBtn2.textContent = 'Zamknij';
            closeBtn2.setAttribute('data-bs-dismiss', 'modal');
            footer.appendChild(btnUsun);
            footer.appendChild(closeBtn2);
          } else {
            const close = document.createElement('button');
            close.className = 'btn btn-secondary';
            close.textContent = 'Zamknij';
            close.setAttribute('data-bs-dismiss', 'modal');
            footer.appendChild(close);
          }

          modal.show();
        },

        // Fizjo może zablokować dowolny termin na swoim kalendarzu - nie potrzebuje do tego prośby pacjenta ani nic
        select: function (info) {
          if (confirm('Zablokować ten termin w kalendarzu?')) {
            fetch('/api/add-appointment/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
              body: JSON.stringify({ start: info.startStr, end: info.endStr }),
            }).then(r => r.json()).then(() => calendar.refetchEvents());
          }
        },
      });

      calendar.render();
    });
  </script>
</body>
</html>
