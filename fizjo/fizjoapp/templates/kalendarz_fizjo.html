{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <title>Kalendarz fizjoterapeuty</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/box.css' %}"/>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
      <span class="navbar-brand"><i class="fas fa-notes-medical" style="color:#cb34d9"></i> FizjoApp – Kalendarz</span>
      <a href="{% url 'dashboard_fizjo' %}" class="btn btn-outline-light btn-sm">← Panel główny</a>
    </div>
  </nav>

  <div class="container">
    <div class="row mb-3">
      <div class="col">
        <span class="badge bg-warning text-dark me-2">⏳ Oczekująca</span>
        <span class="badge bg-success me-2">✅ Zaakceptowana</span>
        <span class="badge bg-secondary me-2">❌ Odrzucona</span>
        <span class="badge bg-danger">🔒 Zablokowana przez Ciebie</span>
      </div>
    </div>
    <div id="calendar" style="max-width:960px;margin:0 auto"></div>
  </div>

  <!-- Approval modal -->
  <div class="modal fade" id="wizytaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Szczegóły wizyty</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Pacjent:</strong> <span id="modalPacjent"></span></p>
          <p><strong>Powód:</strong> <span id="modalPowod"></span></p>
          <p><strong>Status:</strong> <span id="modalStatus"></span></p>
        </div>
        <div class="modal-footer" id="modalFooter">
          <!-- approve/reject buttons injected by JS when status=oczekujaca -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  <script>
    // Read CSRF token from cookie (Django sets it)
    function getCsrf() {
      const name = 'csrftoken';
      const cookies = document.cookie.split(';');
      for (let c of cookies) {
        const [k, v] = c.trim().split('=');
        if (k === name) return decodeURIComponent(v);
      }
      return '';
    }

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const modal = new bootstrap.Modal(document.getElementById('wizytaModal'));

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        slotMinTime: '08:00:00',
        slotMaxTime: '16:00:00',
        allDaySlot: false,
        selectable: true,
        height: 'auto',
        expandRows: false,
        dayHeaderFormat: { weekday: 'long' },
        locale: 'pl',
        events: '/api/get-appointments/',

        // Physio clicks an event → show details + approve/reject for pending
        eventClick: function (info) {
          const props = info.event.extendedProps;
          document.getElementById('modalPacjent').textContent = props.pacjent_nazwa || '—';
          document.getElementById('modalPowod').textContent = props.powod || 'Brak powodu';

          const statusLabels = {
            'oczekujaca': '⏳ Oczekująca',
            'zaakceptowana': '✅ Zaakceptowana',
            'odrzucona': '❌ Odrzucona',
            'zablokowana': '🔒 Zablokowana',
          };
          document.getElementById('modalStatus').textContent = statusLabels[props.status] || props.status;

          const footer = document.getElementById('modalFooter');
          footer.innerHTML = '';

          if (props.status === 'oczekujaca') {
            const wizytaId = info.event.id;

            const btnZatwierdz = document.createElement('button');
            btnZatwierdz.className = 'btn btn-success';
            btnZatwierdz.innerHTML = '<i class="fas fa-check"></i> Zatwierdź';
            btnZatwierdz.addEventListener('click', function () {
              fetch('/api/zatwierdz-wizyte/' + wizytaId + '/', {
                method: 'GET',
                headers: { 'X-CSRFToken': getCsrf() },
              })
                .then(r => r.json())
                .then(() => { modal.hide(); calendar.refetchEvents(); });
            });

            const btnOdrzuc = document.createElement('button');
            btnOdrzuc.className = 'btn btn-danger ms-2';
            btnOdrzuc.innerHTML = '<i class="fas fa-times"></i> Odrzuć';
            btnOdrzuc.addEventListener('click', function () {
              fetch('/api/odrzuc-wizyte/' + wizytaId + '/', {
                method: 'GET',
                headers: { 'X-CSRFToken': getCsrf() },
              })
                .then(r => r.json())
                .then(() => { modal.hide(); calendar.refetchEvents(); });
            });

            footer.appendChild(btnZatwierdz);
            footer.appendChild(btnOdrzuc);
          } else {
            const closeBtn = document.createElement('button');
            closeBtn.className = 'btn btn-secondary';
            closeBtn.textContent = 'Zamknij';
            closeBtn.setAttribute('data-bs-dismiss', 'modal');
            footer.appendChild(closeBtn);
          }

          modal.show();
        },

        select: function (info) {
          if (confirm('Czy chcesz zablokować ten termin w swoim kalendarzu?')) {
            fetch('/api/add-appointment/', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrf(),
              },
              body: JSON.stringify({ start: info.startStr, end: info.endStr }),
            })
              .then(r => r.json())
              .then(() => calendar.refetchEvents());
          }
        },
      });

      calendar.render();
    });
  </script>
</body>
</html>
