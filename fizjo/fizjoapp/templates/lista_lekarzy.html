{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <title>Znajdź fizjoterapeutę</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
</head>
<body>
  <nav class="navbar navbar-dark bg-black shadow-sm mb-4">
    <div class="container">
      <span class="navbar-brand"><i class="fas fa-notes-medical text-success"></i> FizjoApp</span>
      <a href="{% url 'dashboard_pacjent' %}" class="btn btn-outline-light btn-sm">← Mój panel</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-3"><i class="fas fa-search"></i> Znajdź fizjoterapeutę</h2>

    <form method="GET" action="{% url 'wyszukiwarka_lekarzy' %}" class="row g-2 mb-4">
      <div class="col-md-8">
        <input type="text" name="szukaj" value="{{ fraza }}" class="form-control"
               placeholder="Wpisz imię, nazwisko lub specjalizację..."/>
      </div>
      <div class="col-md-4">
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-search"></i> Szukaj
        </button>
      </div>
    </form>

    <div class="row">
      {% for fizjo in lekarze %}
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">
              <i class="fas fa-user-md" style="color:#198754"></i>
              {{ fizjo.tytul }} {{ fizjo.imie }} {{ fizjo.nazwisko }}
            </h5>
            <p class="text-muted mb-1"><i class="fas fa-stethoscope"></i> {{ fizjo.specka }}</p>
            <a href="{% url 'profil_lekarza' fizjo.user.id %}" class="btn btn-outline-primary btn-sm mt-2 w-100">
              <i class="fas fa-calendar-alt"></i> Umów wizytę
            </a>
          </div>
        </div>
      </div>
      {% empty %}
      <div class="col-12">
        <div class="alert alert-warning">
          <i class="fas fa-exclamation-triangle"></i> Nie znaleziono żadnego fizjoterapeuty.
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
