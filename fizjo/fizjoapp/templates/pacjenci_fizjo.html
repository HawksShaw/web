<div class="container mt-5">
  <h2><i class="fas fa-users"></i> Moi Pacjenci</h2>

  <div class="mb-3">
    <a href="{% url 'dashboard_fizjo' %}" class="btn btn-outline-secondary"
      >← Powrót</a
    >
  </div>

  <table class="table table-striped table-hover border mt-4">
    <thead class="table-dark">
      <tr>
        <th>Imię i Nazwisko</th>
        <th>Email</th>
        <th>Akcje</th>
      </tr>
    </thead>
    <tbody>
      {% for pacjent in pacjenci %}
      <tr>
        <td>{{ pacjent.imie }} {{ pacjent.nazwisko }}</td>
        <td>{{ pacjent.email }}</td>
        <td>
          <a
            href="{% url 'profil_pacjenta' pacjent.id %}"
            class="btn btn-sm btn-primary"
          >
            Zobacz Profil i Postępy
          </a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="text-center">
          Nie masz jeszcze przypisanych pacjentów.
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
