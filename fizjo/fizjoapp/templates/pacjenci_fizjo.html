{% load static %}
<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Lista pacjentów</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/box.css' %}" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="Sekcja mb-5">
        <h2><i class="fas fa-user-injured"></i> Lista Pacjentów</h2>
        <a href="{% url 'dodaj_pacjenta' %}" class="btn btn-primary mb-3">
          <i class="fas fa-user-plus"></i> Dodaj Pacjenta
        </a>
        <table class="table table-striped table-hover border">
          <thead class="table-dark">
            <tr>
              <th>Pacjent</th>
              <th>Email</th>
              <th>Lekarz Prowadzący</th>
            </tr>
          </thead>
          <tbody>
            {% for pacjent in pacjenci %}
            <tr>
              <td>{{ pacjent.imie }} {{ pacjent.nazwisko }}</td>
              <td>{{ pacjent.email }}</td>
              <td>{{ pacjent.fizjo }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="3">Brak pacjentów w bazie.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <script>
        // ==========================================
      // ELEMENT 2: Rysowanie wykresu (Chart.js)
      // ==========================================
      const ctx = document.getElementById("statystykiWyresu").getContext("2d");

      // Pobieramy realną liczbę obiektów przekazaną z Django!
      const iloscFizjo = parseInt("{{ fizjoterapeuci|length }}") || 0;
      const iloscPacjentów = parseInt("{{ pacjenci|length }}") || 0;
      const iloscProgramów = parseInt("{{ programy|length }}") || 0;

      new Chart(ctx, {
        type: "doughnut", // Wykres pierścieniowy
        data: {
          labels: ["Fizjoterapeuci", "Pacjenci", "Programy"],
          datasets: [
            {
              data: [iloscFizjo, iloscPacjentów, iloscProgramów],
              backgroundColor: ["#198754", "#0d6efd", "#ffc107"], // Kolory dopasowane do Bootstrapa
              borderWidth: 1,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "bottom" },
          },
        },
      });
      </script>
    </body>
</html>
