{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <title>Kalendarz – FizjoApp</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
  <style>
    body{background:#f3eafe;}
    .pac-nav{background:#0d0a17;border-bottom:3px solid #9033d6;}
    .cal-card{background:#fff;border-radius:16px;box-shadow:0 4px 28px rgba(144,51,214,.10);overflow:hidden;}
    .cal-card::before{content:'';display:block;height:5px;background:linear-gradient(90deg,#9033d6,#6722a8);}
    :root{
      --fc-border-color:#e5d4f8;
      --fc-today-bg-color:rgba(144,51,214,.07);
      --fc-highlight-color:rgba(144,51,214,.13);
      --fc-button-bg-color:#9033d6;
      --fc-button-border-color:#7a28b8;
      --fc-button-hover-bg-color:#7a28b8;
      --fc-button-active-bg-color:#6722a8;
    }
    .fc .fc-toolbar-title{font-size:1.2rem;font-weight:700;color:#0d0a17;}
    .fc .fc-button{border-radius:8px!important;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;}
    .fc .fc-button-group .fc-button:first-child{border-radius:8px 0 0 8px!important;}
    .fc .fc-button-group .fc-button:last-child{border-radius:0 8px 8px 0!important;}
    .fc .fc-col-header-cell{background:#f8f2ff;font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:#6722a8;padding:.45rem 0;}
    .fc .fc-col-header-cell a{color:inherit!important;text-decoration:none;}
    .fc .fc-timegrid-slot-label{font-size:.73rem;color:#9033d6;font-weight:600;}
    .fc .fc-event{border-radius:8px!important;border:none!important;box-shadow:0 2px 6px rgba(0,0,0,.12);font-size:.78rem;font-weight:600;padding:2px 6px;transition:transform .1s;}
    .fc .fc-event:hover{transform:translateY(-1px);}
    .legend-bar{background:#faf6ff;border:1px solid #e5d4f8;border-radius:10px;padding:.65rem 1rem;}
    .lpill{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .7rem;border-radius:999px;font-size:.8rem;font-weight:600;}
    .lpill-red{background:#fde8e8;color:#991b1b;border:1.5px solid #ef4444;}
    .lpill-yellow{background:#fff8e1;color:#92640a;border:1.5px solid #f59e0b;}
    .lpill-info{background:#e8f0fe;color:#1a56db;border:1.5px solid #1a56db;}
  </style>
</head>
<body>
  <nav class="pac-nav navbar navbar-dark shadow-sm mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold"><i class="fas fa-notes-medical" style="color:#9033d6"></i> FizjoApp</span>
      <a href="{% url 'wyszukiwarka_lekarzy' %}" class="btn btn-outline-light btn-sm">← Wróć do wyszukiwarki</a>
    </div>
  </nav>

  <div class="container pb-5" style="max-width:1000px">
    <h3 class="fw-bold mb-1">
      <i class="fas fa-user-md me-2" style="color:#9033d6"></i>
      Kalendarz: {{ lekarz.get_full_name|default:lekarz.username }}
    </h3>
    <p class="text-muted mb-4">Kliknij wolny termin, aby zaproponować wizytę.</p>

    <div class="cal-card">
      <div class="p-4">
        <div class="legend-bar d-flex flex-wrap gap-2 mb-4">
          <span class="lpill lpill-red">🔒 Termin zajęty</span>
          <span class="lpill lpill-yellow">⏳ Twoja propozycja oczekuje</span>
          <span class="lpill lpill-info"><i class="fas fa-hand-pointer me-1"></i> Kliknij wolny termin → rezerwacja</span>
        </div>
        <div id="calendar"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  <script>
    const lekarzId = "{{ lekarz.id }}";
    document.addEventListener('DOMContentLoaded', function () {
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'timeGridWeek',
        slotMinTime: '08:00:00',
        slotMaxTime: '18:00:00',
        allDaySlot: false,
        selectable: true,
        height: 'auto',
        nowIndicator: true,
        locale: 'pl',
        headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay' },
        buttonText: { today:'Dziś', month:'Miesiąc', week:'Tydzień', day:'Dzień' },
        dayHeaderFormat: { weekday: 'long' },
        events: '/api/get-appointments/' + lekarzId + '/',
        select: function (info) {
          if (confirm('Zaproponować wizytę w tym terminie?')) {
            const start = encodeURIComponent(info.startStr);
            const end   = encodeURIComponent(info.endStr);
            window.location.href = '/rezerwacja/' + lekarzId + '/?start=' + start + '&end=' + end;
          }
        },
      });
      calendar.render();
    });
  </script>
</body>
</html>
