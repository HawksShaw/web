{% load static %}
<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Lista programów</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/box.css' %}" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="Sektor mb-5">
        <h2><i class="fas fa-dumbbell"></i> Baza Programów Ćwiczeniowych</h2>
        <a href="{% url 'dodaj_program' %}" class="btn btn-warning mb-3">
          <i class="fas fa-clipboard-list"></i> Przypisz Nowy Program
        </a>
        <table class="table table-striped table-hover border">
          <thead class="table-dark">
            <tr>
              <th>Nazwa programu</th>
              <th>Pacjent</th>
              <th>Opis / Zalecenia</th>
            </tr>
          </thead>
          <tbody>
            {% for program in programy %}
            <tr>
              <td>{{ program.nazwa }}</td>
              <td>{{ program.pacjent }}</td>
              <td>{{ program.opis }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="3">Nie ułożono jeszcze żadnego programu.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </body>
</html>
