<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <title>Logowanie do systemu</title>
    </head>
    <body>
        <h2>Zaloguj się do systemu</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Zaloguj</button>
        </form>
        <p>Nie masz konta? <a href="{% url 'rejestracja' %}">Zarejestruj się</a></p>
    </body>
</html>
