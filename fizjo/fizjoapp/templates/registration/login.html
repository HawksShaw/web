                    </div>

                        <form method="POST" novalidate>
                            {% csrf_token %}
                            
                            <div class="mb-3 text-start">
                                <label for="id_username" class="form-label fw-bold text-login">Nazwa użytkownika</label>
                                <input type="text" 
                                       name="username" 
                                       id="id_username" 
                                       class="form-control form-control-lg" 
                                       placeholder="Wpisz swój login..." 
                                       required>
                            </div>
                            
                            <div class="mb-3 text-start">
                                <label for="id_password" class="form-label fw-bold text-login">Hasło</label>
                                <input type="password" 
                                       name="password" 
                                       id="id_password" 
                                       class="form-control form-control-lg" 
                                       placeholder="Wpisz hasło..." 
                                       required>
                            </div>

                            {% if form.errors or form.non_field_errors %}
                                <div class="text-danger fw-bold text-center mt-3 mb-2 small">
                                    <i class="fas fa-times-circle"></i> Niepoprawna nazwa użytkownika lub hasło.
                                </div>
                            {% endif %}

                            <div class="d-grid gap-2 mt-4 mb-2">
                                <button type="submit" class="btn btn-login btn-lg">
                                    Zaloguj się <i class="fas fa-sign-in-alt ms-1"></i>
                                </button>
                            </div>
                        </form>

                    </div>
                    <div class="card-footer text-center py-3 bg-light">
                        <div class="small">
                            Nie masz jeszcze konta? <a href="{% url 'rejestracja' %}" class="fw-bold text-decoration-none" style="color: #660fa8;">Zarejestruj się tutaj</a>

                    </div>
                </div>
